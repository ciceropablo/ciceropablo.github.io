<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cícero Santos</title>
  <meta name="description" content="[BIO]">

  <!-- Canonical & Open Graph -->
  <link rel="canonical" href="https://ciceropablo.github.io/">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://ciceropablo.github.io/">
  <meta property="og:title"       content="Cícero Santos">
  <meta property="og:description" content="[BIO]">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Cícero Santos">
  <meta name="twitter:description" content="[BIO]">

  <!-- Theme color per scheme -->
  <meta name="theme-color" content="#f5f4f0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- Stylesheet — linked so it loads independently of JS -->
  <link rel="stylesheet" href="/src/styles/main.css">

  <!-- Anti-FOUC: apply theme before first paint.
       Reads localStorage, falls back to prefers-color-scheme.
       Inline so it runs synchronously before any paint. -->
  <script>
    (function () {
      var s = localStorage.getItem('theme');
      var d = s || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', d);
    }());
  </script>

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Cícero Santos",
    "email": "cicero.pablos@gmail.com",
    "url": "https://ciceropablo.github.io/",
    "sameAs": [
      "https://www.linkedin.com/in/ciceropablo/",
      "https://github.com/ciceropablo"
    ]
  }
  </script>
</head>
<body>

  <!-- Decorative background canvas — hidden from assistive technology -->
  <canvas id="bg-canvas" aria-hidden="true" role="presentation"></canvas>

  <main>
    <header>
      <h1>Cícero Santos</h1>
      <p class="subtitle">[BIO_SUBTITLE]</p>
    </header>

    <section aria-label="Sobre">
      <p class="bio">[BIO]</p>
    </section>

    <footer>
      <nav aria-label="Contato e redes">
        <a href="mailto:cicero.pablos@gmail.com">cicero.pablos@gmail.com</a>
        <a
          href="https://www.linkedin.com/in/ciceropablo/"
          target="_blank"
          rel="noopener noreferrer"
        >LinkedIn</a>
        <a
          href="https://github.com/ciceropablo"
          target="_blank"
          rel="noopener noreferrer"
        >GitHub</a>
      </nav>
    </footer>
  </main>

  <!-- Theme toggle — positioned fixed via CSS, wired up by theme.js -->
  <button
    id="theme-toggle"
    type="button"
    aria-pressed="false"
    aria-label="Switch to dark mode"
  >dark</button>

  <!-- JS entry — module, non-blocking -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
